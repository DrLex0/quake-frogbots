fraglimit 50
timelimit 6
teamplay 0
deathmatch 3
maxplayers 8
hostname "Frogbot FFA"


// Requires engine with custom cvar support (i.e., most modern engines)
set add_q_aerowalk	1	// quad in map Aerowalk
set deathmatch 3	// vkQuake (and possibly other engines) workaround for first load

// TODO may allow loading these from custom cvars as well
// localinfo k_overtime		0	// overtime mode (0 = off, 1 = time, 2 = SD)
// localinfo k_exttime		0	// overtime length if overtime == 1
// localinfo allow_startsound	0	// start sound mode (0 = off, 1 = on)
// localinfo k_kfp			1	// "kill" flood protection

// Game parameters:
// ENABLE_POWERUPS + LAVA_CHEAT + ENABLE_DROPWEAP + ENABLE_BOTCHAT + BOTJUMP
samelevel 8393473

// classic map rotation order
//alias nm_dm4 "cmd fb_nm ztndm3"
//alias nm_ztndm3 "cmd fb_nm dm3"
//alias nm_dm3 "cmd fb_nm frobodm2"
//alias nm_frobodm2 "cmd fb_nm dm6"
//alias nm_dm6 "cmd fb_nm spinev2"
//alias nm_spinev2 "cmd fb_nm aerowalk"
//alias nm_aerowalk "cmd fb_nm dm4"

// map rotation order (from nQuake, no retail maps)
alias nm_ztndm3 "cmd fb_nm genocide"
alias nm_genocide "cmd fb_nm ukpak2"
alias nm_ukpak2 "cmd fb_nm shine"
alias nm_shine "cmd fb_nm q3dm6qw"
alias nm_q3dm6qw "cmd fb_nm dm4ish"
alias nm_dm4ish "cmd fb_nm rwild"
alias nm_rwild "cmd fb_nm ultrav"
alias nm_ultrav "cmd fb_nm bsdm6"
alias nm_bsdm6 "cmd fb_nm schloss"
alias nm_schloss "cmd fb_nm del1"
alias nm_del1 "cmd fb_nm ztndm3"

echo "Frogbot FFA cfg loaded"

//map dm4
map ztndm3

// must set skill after map change, because engine may force it to 1-3 range
skill 5	// bot skill 0-20
